  <circle cx="200" cy="200" r="150" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.2"/>
  <text x="200" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="100" font-weight="bold" fill="url(#text-gradient)" text-anchor="middle">JS</text>
